# ── SensorGuard — Demo IoT (IFTS N°11 — PPI 2026) ───────────────────────────
# Nginx virtual host served at sensorguard.agentplayground.net
# Traefik routes this hostname here via the compose labels.
# CLEANUP: delete this file + webroot/sensorguard/ after June 19 2026.
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name sensorguard.agentplayground.net;

    root /var/www/sensorguard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}

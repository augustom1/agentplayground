# ── GuardTech Solutions — empresa de SensorGuard (IFTS N°11 — PPI 2026) ─────
# Nginx virtual host served at guardtech.agentplayground.net
# Traefik routes this hostname here via the compose labels.
# Chatbot: /api/chat is proxied to the Ollama container (never exposed raw).
# CLEANUP: delete this file + webroot/guardtech/ after June 19 2026 (with sensorguard).
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name guardtech.agentplayground.net;

    root /var/www/guardtech;
    index index.html;

    location = /api/chat {
        if ($request_method != POST) { return 405; }
        proxy_pass http://ollama:11434/api/chat;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;       # small CPU models can be slow
        client_max_body_size 32k;      # limit chat payload size
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}

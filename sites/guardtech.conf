# ── GuardTech Solutions — empresa de SensorGuard (IFTS N°11 — PPI 2026) ─────
# Nginx virtual host served at guardtech.agentplayground.net
# Traefik routes this hostname here via the compose labels.
# Chatbot: /api/chat is proxied to the Ollama container (never exposed raw).
# CLEANUP: delete this file + webroot/guardtech/ after June 19 2026 (with sensorguard).
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name guardtech.agentplayground.net;

    root /var/www/guardtech;
    index index.html;

    location = /api/chat {
        # CORS: allow the chatbot to call this endpoint from local copies
        # of index.html (file:// or localhost previews), not just this vhost
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        if ($request_method != POST) { return 405; }
        add_header Access-Control-Allow-Origin "*" always;
        # Ollama 403s any browser Origin it doesn't whitelist — strip it;
        # access control already happens here (POST-only, this path only)
        proxy_set_header Origin "";
        proxy_pass http://ollama:11434/api/chat;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;       # small CPU models can be slow
        client_max_body_size 32k;      # limit chat payload size
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
